name: Unstoppable Android Build

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Toolchain
        run: sudo apt-get update && sudo apt-get install -y make gcc-aarch64-linux-gnu linux-headers-generic
      
      - name: Build Module
        run: make
        
      - name: Strip Debug Symbols
        run: aarch64-linux-gnu-strip --strip-unneeded src/kpm.ko
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KPM_Final_Payload
          path: src/kpm.ko
          
