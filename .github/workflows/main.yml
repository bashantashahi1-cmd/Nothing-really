name: Unstoppable Android Build

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y make gcc-aarch64-linux-gnu
      
      - name: Build Module
        # We define all variables inline to ensure they override the Makefile
        run: |
          make ARCH=arm64 \
               CROSS_COMPILE=aarch64-linux-gnu- \
               KDIR=/usr/src/linux-headers-$(uname -r)
        
      - name: Strip Debug Symbols
        run: aarch64-linux-gnu-strip --strip-unneeded src/kpm.ko
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KPM_Final_Payload
          path: src/kpm.ko
          
