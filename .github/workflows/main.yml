name: Unstoppable Android Build

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Install Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y make gcc-aarch64-linux-gnu linux-headers-generic
      
      - name: Build Module
        run: |
          # Ensure source is in the expected spot
          mkdir -p src
          
          # Force the kernel build system to acknowledge our module
          echo "obj-m := src/kpm.o" > Kbuild
          
          # Run the build directly against the kernel headers
          make -C /usr/src/linux-headers-$(uname -r) \
               M=$(pwd) \
               ARCH=arm64 \
               CROSS_COMPILE=aarch64-linux-gnu- \
               KCFLAGS="-w -fno-stack-protector -D__KERNEL__ -DMODULE" \
               modules
        
      - name: Strip Debug Symbols
        run: aarch64-linux-gnu-strip --strip-unneeded src/kpm.ko
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KPM_Final_Payload
          path: src/kpm.ko
          
