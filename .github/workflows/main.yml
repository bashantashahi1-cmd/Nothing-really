name: Unstoppable Android Build

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y make gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu
      
      - name: Build and Sanitize Module
        run: |
          # Create a high-performance wrapper that strictly ignores the bad flags
          echo '#!/bin/sh' > /tmp/aarch64-wrapper
          echo 'aarch64-linux-gnu-gcc $(echo "$@" | sed "s/-mrecord-mcount//g" | sed "s/-mfentry//g" | sed "s/-mno-record-mcount//g")' >> /tmp/aarch64-wrapper
          chmod +x /tmp/aarch64-wrapper
          
          # Force the use of the wrapper for all tools
          export CC=/tmp/aarch64-wrapper
          export AS=/tmp/aarch64-wrapper
          export LD=aarch64-linux-gnu-ld
          
          echo "obj-m := kpm.o" > Kbuild
          
          # Build with environment-level enforcement
          make -C /usr/src/linux-headers-$(uname -r) \
               M=$(pwd) \
               ARCH=arm64 \
               CROSS_COMPILE=aarch64-linux-gnu- \
               KCFLAGS="-w -fno-stack-protector -D__KERNEL__ -DMODULE" \
               modules
               
          mv kpm.ko kpm.kpm
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KPM_Final_Payload
          path: kpm.kpm
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KPM_Final_Payload
          path: kpm.ko
          
