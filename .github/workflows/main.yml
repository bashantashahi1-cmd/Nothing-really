name: Unstoppable Android Build

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y make gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu
      
      - name: Build and Sanitize Module
        run: |
          # 1. Ensure kpm.c exists in the root
          # If your source is in 'src/kpm.c', move it to root
          if [ -f "src/kpm.c" ]; then mv src/kpm.c .; fi
          
          # 2. Create the Kbuild file
          echo "obj-m := kpm.o" > Kbuild
          
          # 3. Create the Wrapper
          echo '#!/bin/sh' > /tmp/wrapper
          echo 'aarch64-linux-gnu-gcc $(echo "$@" | sed "s/-mrecord-mcount//g" | sed "s/-mfentry//g")' >> /tmp/wrapper
          chmod +x /tmp/wrapper
          
          # 4. Build
          make -C /usr/src/linux-headers-$(uname -r) \
               M=$(pwd) \
               ARCH=arm64 \
               CROSS_COMPILE=aarch64-linux-gnu- \
               CC=/tmp/wrapper \
               AS=/tmp/wrapper \
               KCFLAGS="-w -fno-stack-protector -D__KERNEL__ -DMODULE" \
               modules
               
          mv kpm.ko kpm.kpm
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KPM_Final_Payload
          path: kpm.kpm
          
