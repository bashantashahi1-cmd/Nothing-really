name: Unstoppable Android Build

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Install Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y make gcc-aarch64-linux-gnu linux-headers-generic
      
      - name: Build Module
        run: |
          mkdir -p src
          
          # We use Kbuild to set explicit flags that override the kernel's broken ones
          echo "obj-m := kpm.o" > Kbuild
          echo "ccflags-y := -w -fno-stack-protector -mno-record-mcount -mno-mfentry -D__KERNEL__ -DMODULE" >> Kbuild
          
          # Move our source to where Kbuild expects it
          mv src/kpm.c .
          
          # Run the build
          make -C /usr/src/linux-headers-$(uname -r) \
               M=$(pwd) \
               ARCH=arm64 \
               CROSS_COMPILE=aarch64-linux-gnu- \
               modules
        
      - name: Strip Debug Symbols
        run: aarch64-linux-gnu-strip --strip-unneeded kpm.ko
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KPM_Final_Payload
          path: kpm.ko
          
