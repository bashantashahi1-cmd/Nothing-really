name: Ultimate Kernel Build Pipeline

on: [push]

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup WDK Environment
        shell: powershell
        run: |
          # This ensures the kernel headers are in the path
          Write-Host "Verifying environment..."
          $wdkPath = "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\x64"
          $env:Path += ";$wdkPath"
          [System.Environment]::SetEnvironmentVariable('Path', $env:Path, 'Process')

      - name: Clean Build
        run: |
          msbuild DriverProject.sln /t:Rebuild /p:Configuration=Release /p:Platform=x64

      - name: Generate Random Signature
        shell: powershell
        run: |
          $file = ".\bin\Release\driver.sys"
          if (Test-Path $file) {
            $rand = -join ((65..90) + (97..122) | Get-Random -Count 32)
            Add-Content -Path $file -Value $rand -Encoding Byte
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KPM_Payload
          path: .\bin\Release\driver.sys
          
