name: Unstoppable Android Build

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Toolchain
        run: |
          sudo apt-get update
          # Install the standard aarch64 cross-compiler
          sudo apt-get install -y gcc-aarch64-linux-gnu make linux-headers-generic
      
      - name: Build Module
        env:
          # Point to the generic cross-compiler instead of the Android-specific one
          CROSS_COMPILE: aarch64-linux-gnu-
        run: make
        
      - name: Strip Debug Symbols
        run: aarch64-linux-gnu-strip --strip-unneeded src/kpm.ko
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KPM_Final_Payload
          path: src/kpm.ko
          
